# =============================================================================
# pydae Monorepo - Workspace Root
# =============================================================================
# This file is NOT a Python package. It orchestrates the uv workspace.
# Run `uv sync --all-packages` from this directory to install everything.
# =============================================================================

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv]
dev-dependencies = [
    "pytest>=7.0",
    "ruff>=0.4",
    "ipython>=8.0",
]

# --- Shared Tool Configuration ---

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q"
testpaths = ["tests"]
