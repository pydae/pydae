name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Test job: builds across OS × Python version matrix
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }} / ${{ matrix.solver }}-${{ matrix.backend }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python: ["3.10", "3.11", "3.12"]
        solver: [sparse, dense]
        backend: [cffi, ctypes]
        exclude:
          # CFFI fails on Windows (MinGW cannot link MSVC Python 3.10+ ABI)
          - os: windows-latest
            backend: cffi

    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYDAE_PARALLEL: "1"
      CONDALIB: "$CONDA/lib"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Conda (${{ matrix.os }} / Python ${{ matrix.python }})
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          miniforge-variant: Miniforge3
          python-version: ${{ matrix.python }}
          use-mamba: true
          auto-update-conda: true

      - name: Install compiler (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash -el {0}
        run: |
          conda install -c conda-forge suitesparse
          echo "Using system gcc (pre-installed on ubuntu-latest)"

      - name: Install compiler (macOS)
        if: matrix.os == 'macos-14'
        shell: bash -el {0}
        run: |
          conda install -c conda-forge suitesparse
          echo "Using Apple Clang (pre-installed on macos-14)"

      - name: Install compiler (Windows MinGW)
        if: matrix.os == 'windows-latest'
        shell: bash -el {0}
        run: |
          conda install -c conda-forge m2w64-toolchain libpython
          conda install -c conda-forge suitesparse
          echo "Using MinGW (m2w64-toolchain)"

      - name: Setup Intel MKL (Intel/AMD only)
        if: >-
          matrix.os == 'ubuntu-latest' &&
          matrix.solver == 'sparse' &&
          matrix.backend == 'cffi'
        shell: bash -el {0}
        run: |
          conda install -c conda-forge mkl mkl-include
          echo "MKL/PARDISO configured for Intel/AMD"

      - name: Install dependencies
        shell: bash -el {0}
        run: |
          conda install -c conda-forge \
            pip \
            pytest \
            numpy \
            scipy \
            sympy \
            cffi \
            dill \
            jsonschema
          pip install pytest-xdist pytest-timeout pluggy hjson

      - name: Install local packages
        shell: bash -el {0}
        run: |
          pip install hatchling editables
          pip install -e packages/pydae-core --no-build-isolation
          pip install -e packages/pydae-bps --no-build-isolation
          pip install -e packages/pydae-uds --no-build-isolation

      - name: Install solver C-libraries
        if: matrix.os == 'macos-14'
        shell: bash -el {0}
        run: conda install -c conda-forge suitesparse

      - name: Set LD_LIBRARY_PATH (macOS)
        if: matrix.os == 'macos-14'
        shell: bash -el {0}
        run: echo "export LD_LIBRARY_PATH=\$CONDA/lib:\$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Install solver C-libraries (Intel)
        if: matrix.os != 'macos-14'
        shell: bash -el {0}
        run: conda install -c conda-forge suitesparse mkl

      - name: Set LD_LIBRARY_PATH
        shell: bash -el {0}
        run: echo "export LD_LIBRARY_PATH=\$CONDA/lib:\$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Diagnostics
        shell: bash -el {0}
        run: |
          echo "=== Environment ==="
          python --version
          conda list python
          echo "=== Compiler ==="
          if command -v gcc &> /dev/null; then gcc --version | head -1; fi
          if command -v clang &> /dev/null; then clang --version | head -1; fi
          if command -v x86_64-w64-mingw32-gcc &> /dev/null; then x86_64-w64-mingw32-gcc --version | head -1; fi
          echo "=== SuiteSparse ==="
          conda list suitesparse
          echo "=== MKL ==="
          conda list mkl 2>/dev/null || echo "MKL not installed"
          echo "=== LD_LIBRARY_PATH ==="
          echo "CONDA: $CONDA"
          ls -la "$CONDA/lib/libsuitesparse"* 2>/dev/null || echo "SuiteSparse libs not in $CONDA/lib"
          ls -la "$CONDA/lib/libmkl"* 2>/dev/null || echo "MKL libs not in $CONDA/lib"

      - name: Run fast tests (parse, symbolic, codegen)
        shell: bash -el {0}
        run: |
          pytest tests/core/test_pendulum.py -m "parse or symbolic or codegen" \
            -v --tb=short --junit-xml=/tmp/pytest-fast.xml

      - name: Run build tests
        if: matrix.os != 'windows-latest'
        shell: bash -el {0}
        run: |
          pytest tests/core/ -m "build" -v --tb=short --junit-xml=/tmp/pytest-build.xml

      - name: Run dense solver tests
        if: matrix.solver == 'dense'
        shell: bash -el {0}
        run: |
          pytest tests/core/test_compilation_modes.py -k "test_compilation_and_execution[ctypes-False]" \
            -v --tb=short -s --junit-xml=/tmp/pytest-dense.xml

      - name: Run KLU tests sparse
        if: matrix.solver == 'sparse'
        shell: bash -el {0}
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            pytest tests/core/test_compilation_modes.py -k "test_compilation_and_execution and klu and ctypes" \
              -v --tb=short -s --junit-xml=/tmp/pytest-klu.xml
          else
            pytest tests/core/test_compilation_modes.py -k "test_compilation_and_execution and klu and cffi" \
              -v --tb=short -s --junit-xml=/tmp/pytest-klu.xml
          fi

      - name: Run PARDISO tests (Linux sparse cffi only)
        if: matrix.os == 'ubuntu-latest' && matrix.solver == 'sparse' && matrix.backend == 'cffi'
        shell: bash -el {0}
        run: |
          pytest tests/core/test_compilation_modes.py::test_pardiso_compilation \
            -v --tb=short --junit-xml=/tmp/pytest-pardiso.xml

      - name: Run Accelerate tests (macOS only)
        if: matrix.os == 'macos-14'
        shell: bash -el {0}
        run: |
          echo "Accelerate (Apple Accelerate) - platform-native sparse solver"
          echo "Test execution depends on pydae Accelerate support"
          echo "Accelerate testing placeholder - implement when pydae adds Accelerate backend"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python }}-${{ matrix.solver }}-${{ matrix.backend }}
          path: /tmp/pytest-*.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}-py${{ matrix.python }}-${{ matrix.solver }}-${{ matrix.backend }}
          path: |
            build/*.c
            build/*.so 2>/dev/null || echo "No build artifacts"
          retention-days: 7
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────────
  # Summary job: collects results and generates Markdown table
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results
          pattern: test-results-*
          merge-multiple: true

      - name: Generate summary table
        shell: bash -el {0}
        run: |
          # Build matrix results from JUnit XML files
          cat << 'EOF' > /tmp/generate_summary.py
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          # Matrix dimensions
          oses = ["ubuntu-latest", "macos-14", "windows-latest"]
          backends = ["dense-ctypes", "dense-cffi", "klu-ctypes", "klu-cffi"]

          # Initialize results matrix
          results = {os: {be: "❌" for be in backends} for os in oses}

          # Parse JUnit XML results
          results_dir = Path("test-results")
          if results_dir.exists():
              for xml_file in results_dir.glob("*.xml"):
                  try:
                      tree = ET.parse(xml_file)
                      root = tree.getroot()
                      
                      # Filename: test-results-{os}-{pyVER}-{solver}-{backend}
                      # Example: test-results-ubuntu-latest-py3.10-sparse-cffi
                      stem = xml_file.stem.replace("test-results-", "")
                      parts = stem.split("-")
                      # parts: ["ubuntu", "latest", "py3", "10", "sparse", "cffi"]
                      os_name = parts[0] + "-" + parts[1]
                      solver = parts[4]
                      backend = parts[5]
                      
                      be_col = f"{solver}-{backend}"
                      if be_col not in backends:
                          print(f"Skipping unknown backend: {be_col}")
                          continue
                      
                      # Count test results
                      testsuite = root.find('.//testsuite')
                      if testsuite is not None:
                          failures = int(testsuite.get('failures', 0))
                          tests = int(testsuite.get('tests', 0))
                          if failures == 0 and tests > 0:
                              results[os_name][be_col] = "✅"
                          elif failures > 0:
                              results[os_name][be_col] = "❌"
                          else:
                              results[os_name][be_col] = "⚠️"
                          print(f"{os_name}/{be_col}: tests={tests} failures={failures}")
                  except Exception as e:
                      print(f"Skipping {xml_file}: {e}")

          # Generate Markdown table
          md = "# pydae CI Test Results\n\n"
          md += "| OS | " + " | ".join(backends) + " |\n"
          md += "|" + "|".join(["---" for _ in range(len(backends) + 1)]) + "|\n"

          for os_name in oses:
              md += f"| {os_name} | "
              md += " | ".join(results[os_name].get(be, "❌") for be in backends)
              md += " |\n"

          md += "\n---\n\n"
          md += "## Diagnostics\n\n"
          md += "If any tests failed, the detailed **DAE SOLVER DIAGNOSTIC REPORT** is available in the test logs.\n\n"
          md += "To view:\n"
          md += "1. Go to the failed job's **Logs**\n"
          md += "2. Search for `DAE SOLVER DIAGNOSTIC REPORT`\n"

          # Write to GITHUB_STEP_SUMMARY
          with open(os.environ["GITHUB_STEP_SUMMARY"], "w") as f:
              f.write(md)

          print(md)
          EOF

          python /tmp/generate_summary.py