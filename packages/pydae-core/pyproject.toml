# =============================================================================
# pydae-core: The DAE Solver Engine
# =============================================================================
# Published to PyPI as "pydae" (the core package keeps the short name).
# Users install with: pip install pydae
# Import with:        from pydae.core import Builder, Model
# =============================================================================

[project]
name = "pydae"
version = "1.2.0"
description = "Core engine for solving and analyzing Differential-Algebraic Equation (DAE) systems"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Juan Manuel Mauricio", email = "jmmauricio6@gmail.com"}
]
keywords = ["DAE", "differential-algebraic", "simulation", "power-systems", "engineering"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Development Status :: 4 - Beta",
    "Intended Audience :: Education",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "numpy>=1.26.0",
    "scipy>=1.13.0",
    "sympy>=1.12.0",
    "numba>=0.59.0",
    "cffi>=1.16.0",
    "setuptools>=69.0",  # required by cffi.ffi.compile() on Python >= 3.12
    "hjson>=3.0.0",
    "pandas>=2.2.0",
    "tabulate>=0.9.0",  # required by pandas.DataFrame.to_markdown()
    "matplotlib>=3.8.0",
    "svgwrite>=1.4.0",
    "pytz>=2026.1.post1",
]

[project.urls]
Homepage = "https://github.com/pydae/pydae"
Documentation = "https://pydae.readthedocs.io"
Repository = "https://github.com/pydae/pydae"
Issues = "https://github.com/pydae/pydae/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pydae"]

[tool.hatch.build.targets.sdist]
include = ["src/", "README.md", "LICENSE"]

[tool.hatch.build.targets.wheel.force-include]
# Ensure C solver sources are shipped with the package
"src/pydae/daesolver/daesolver_dense.c" = "pydae/daesolver/daesolver_dense.c"
"src/pydae/daesolver/daesolver_dense.h" = "pydae/daesolver/daesolver_dense.h"
"src/pydae/daesolver/daesolver_run_lapack.c" = "pydae/daesolver/daesolver_run_lapack.c"
"src/pydae/daesolver/daesolver_run_lapack.h" = "pydae/daesolver/daesolver_run_lapack.h"
