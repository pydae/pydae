# ReadTheDocs build configuration for pydae-core.
#
# To publish: create a ReadTheDocs project whose "Configuration file path"
# points to  docs/pydae-core/.readthedocs.yaml
# (Admin -> Advanced Settings -> Configuration file).

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/pydae-core/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/pydae-core/requirements.txt
    - method: pip
      path: packages/pydae-core

formats:
  - htmlzip
  - pdf
