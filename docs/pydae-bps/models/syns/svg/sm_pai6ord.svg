<?xml version="1.0" encoding="UTF-8"?>
<svg
   width="185mm"
   height="108mm"
   viewBox="0 0 185 108"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker id="arr" viewBox="0 0 8 8" refX="7" refY="4"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#34495e"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 8 8" refX="7" refY="4"
            markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#2980b9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="185" height="108" fill="#fafbfc" rx="2"/>

  <!-- Title -->
  <text x="92.5" y="6" text-anchor="middle"
        font-family="sans-serif" font-size="4.5" font-weight="bold" fill="#2c3e50">
    PAI 6th-order synchronous machine
  </text>

  <!-- ── BLOCK 1: Mechanical (swing equations) ── -->
  <rect x="62" y="10" width="58" height="18"
        fill="#eaf4fb" stroke="#2980b9" stroke-width="0.6" rx="2"/>
  <text x="91" y="17" text-anchor="middle"
        font-family="sans-serif" font-size="3.8" font-weight="bold" fill="#1a5276">
    Mechanical
  </text>
  <text x="91" y="22.5" text-anchor="middle"
        font-family="monospace" font-size="3.2" fill="#2c3e50">
    dδ/dt = Ωb(ω−ωs) − Kδ·δ
  </text>
  <text x="91" y="26.5" text-anchor="middle"
        font-family="monospace" font-size="3.2" fill="#2c3e50">
    dω/dt = (pm−pe−D·Δω)/(2H)
  </text>

  <!-- ── BLOCK 2: d-axis transient ── -->
  <rect x="62" y="34" width="58" height="20"
        fill="#eafaf1" stroke="#27ae60" stroke-width="0.6" rx="2"/>
  <text x="91" y="41" text-anchor="middle"
        font-family="sans-serif" font-size="3.8" font-weight="bold" fill="#1e8449">
    d-axis transient
  </text>
  <text x="91" y="46.5" text-anchor="middle"
        font-family="monospace" font-size="3.0" fill="#2c3e50">
    de'q/dt = f(e'q, id, ψ2d, vf) / T'd0
  </text>
  <text x="91" y="51.5" text-anchor="middle"
        font-family="monospace" font-size="3.0" fill="#2c3e50">
    dψ2d/dt = (e'q − ψ2d − (X'd−Xl)·id) / T''d0
  </text>

  <!-- ── BLOCK 3: q-axis transient ── -->
  <rect x="62" y="60" width="58" height="20"
        fill="#fef9e7" stroke="#f39c12" stroke-width="0.6" rx="2"/>
  <text x="91" y="67" text-anchor="middle"
        font-family="sans-serif" font-size="3.8" font-weight="bold" fill="#7d6608">
    q-axis transient
  </text>
  <text x="91" y="72.5" text-anchor="middle"
        font-family="monospace" font-size="3.0" fill="#2c3e50">
    de'd/dt = f(e'd, iq, ψ2q) / T'q0
  </text>
  <text x="91" y="77.5" text-anchor="middle"
        font-family="monospace" font-size="3.0" fill="#2c3e50">
    dψ2q/dt = (−e'd − ψ2q − (X'q−Xl)·iq) / T''q0
  </text>

  <!-- ── BLOCK 4: Stator (algebraic) ── -->
  <rect x="62" y="86" width="58" height="18"
        fill="#f9f0ff" stroke="#8e44ad" stroke-width="0.6" rx="2"/>
  <text x="91" y="93" text-anchor="middle"
        font-family="sans-serif" font-size="3.8" font-weight="bold" fill="#6c3483">
    Stator (algebraic)
  </text>
  <text x="91" y="98.5" text-anchor="middle"
        font-family="monospace" font-size="3.0" fill="#2c3e50">
    0 = Ra·id + ω·ψq + vd
  </text>
  <text x="91" y="103" text-anchor="middle"
        font-family="monospace" font-size="3.0" fill="#2c3e50">
    ψd = e'q − (X'd−Xl)·(γd1·id − γd2·ψ2d)
  </text>

  <!-- ── INPUT LABELS ── -->
  <!-- pm → Block 1 -->
  <line x1="15" y1="19" x2="61" y2="19"
        stroke="#34495e" stroke-width="0.5" marker-end="url(#arr)"/>
  <text x="2" y="20.5" font-family="sans-serif" font-size="3.8" fill="#34495e"
        font-style="italic">p</text>
  <text x="7" y="21.5" font-family="sans-serif" font-size="3.0" fill="#34495e">m</text>

  <!-- vf → Block 2 -->
  <line x1="15" y1="44" x2="61" y2="44"
        stroke="#27ae60" stroke-width="0.5" marker-end="url(#arr)"/>
  <text x="2" y="45.5" font-family="sans-serif" font-size="3.8" fill="#27ae60"
        font-style="italic">v</text>
  <text x="7" y="46.5" font-family="sans-serif" font-size="3.0" fill="#27ae60">f</text>

  <!-- V, θ → Block 4 -->
  <line x1="15" y1="95" x2="61" y2="95"
        stroke="#8e44ad" stroke-width="0.5" marker-end="url(#arr)"/>
  <text x="2" y="93" font-family="sans-serif" font-size="3.8" fill="#8e44ad"
        font-style="italic">V</text>
  <text x="2" y="97.5" font-family="sans-serif" font-size="3.8" fill="#8e44ad"
        font-style="italic">θ</text>

  <!-- ── STATE / OUTPUT LABELS ── -->
  <!-- Block 1 → δ, ω -->
  <line x1="120" y1="16" x2="145" y2="16"
        stroke="#2980b9" stroke-width="0.5" marker-end="url(#arr-b)"/>
  <text x="146" y="17.5" font-family="sans-serif" font-size="3.8" fill="#1a5276"
        font-style="italic">δ</text>
  <line x1="120" y1="23" x2="145" y2="23"
        stroke="#2980b9" stroke-width="0.5" marker-end="url(#arr-b)"/>
  <text x="146" y="24.5" font-family="sans-serif" font-size="3.8" fill="#1a5276"
        font-style="italic">ω</text>

  <!-- Block 2 → e'q, ψ2d -->
  <line x1="120" y1="40" x2="145" y2="40"
        stroke="#27ae60" stroke-width="0.5" marker-end="url(#arr-b)"/>
  <text x="146" y="41.5" font-family="sans-serif" font-size="3.5" fill="#1e8449"
        font-style="italic">e'q</text>
  <line x1="120" y1="48" x2="145" y2="48"
        stroke="#27ae60" stroke-width="0.5" marker-end="url(#arr-b)"/>
  <text x="146" y="49.5" font-family="sans-serif" font-size="3.5" fill="#1e8449"
        font-style="italic">ψ2d</text>

  <!-- Block 3 → e'd, ψ2q -->
  <line x1="120" y1="66" x2="145" y2="66"
        stroke="#f39c12" stroke-width="0.5" marker-end="url(#arr-b)"/>
  <text x="146" y="67.5" font-family="sans-serif" font-size="3.5" fill="#7d6608"
        font-style="italic">e'd</text>
  <line x1="120" y1="74" x2="145" y2="74"
        stroke="#f39c12" stroke-width="0.5" marker-end="url(#arr-b)"/>
  <text x="146" y="75.5" font-family="sans-serif" font-size="3.5" fill="#7d6608"
        font-style="italic">ψ2q</text>

  <!-- Block 4 → id, iq, pg, qg -->
  <line x1="120" y1="90" x2="145" y2="90"
        stroke="#8e44ad" stroke-width="0.5" marker-end="url(#arr-b)"/>
  <text x="146" y="91.5" font-family="sans-serif" font-size="3.5" fill="#6c3483"
        font-style="italic">i</text>
  <text x="149.5" y="92.5" font-family="sans-serif" font-size="2.8" fill="#6c3483">d</text>
  <line x1="120" y1="97" x2="145" y2="97"
        stroke="#8e44ad" stroke-width="0.5" marker-end="url(#arr-b)"/>
  <text x="146" y="98.5" font-family="sans-serif" font-size="3.5" fill="#6c3483"
        font-style="italic">i</text>
  <text x="149.5" y="99.5" font-family="sans-serif" font-size="2.8" fill="#6c3483">q</text>
  <line x1="120" y1="103" x2="160" y2="103"
        stroke="#8e44ad" stroke-width="0.5" marker-end="url(#arr-b)"/>
  <text x="161" y="104.5" font-family="sans-serif" font-size="3.5" fill="#6c3483"
        font-style="italic">p</text>
  <text x="164.5" y="105.5" font-family="sans-serif" font-size="2.8" fill="#6c3483">g</text>
  <text x="167.5" y="104.5" font-family="sans-serif" font-size="3.0" fill="#6c3483">,</text>
  <text x="169" y="104.5" font-family="sans-serif" font-size="3.5" fill="#6c3483"
        font-style="italic">q</text>
  <text x="172.5" y="105.5" font-family="sans-serif" font-size="2.8" fill="#6c3483">g</text>

  <!-- ── CROSS-CONNECTIONS ── -->
  <!-- δ down to stator -->
  <line x1="80" y1="28" x2="80" y2="85"
        stroke="#2980b9" stroke-width="0.35" stroke-dasharray="1.5,1"
        marker-end="url(#arr)"/>
  <!-- e'q, ψ2d down to stator -->
  <line x1="91" y1="54" x2="91" y2="85"
        stroke="#27ae60" stroke-width="0.35" stroke-dasharray="1.5,1"
        marker-end="url(#arr)"/>
  <!-- e'd, ψ2q down to stator -->
  <line x1="100" y1="80" x2="100" y2="85"
        stroke="#f39c12" stroke-width="0.35" stroke-dasharray="1.5,1"
        marker-end="url(#arr)"/>

  <!-- ── FEEDBACK: pe → mechanical ── -->
  <line x1="130" y1="95" x2="155" y2="95"
        stroke="#c0392b" stroke-width="0.35" stroke-dasharray="1.5,1"/>
  <line x1="155" y1="95" x2="155" y2="7"
        stroke="#c0392b" stroke-width="0.35" stroke-dasharray="1.5,1"/>
  <line x1="155" y1="7" x2="120" y2="7"
        stroke="#c0392b" stroke-width="0.35" stroke-dasharray="1.5,1"
        marker-end="url(#arr)"/>
  <text x="157" y="50" font-family="sans-serif" font-size="3.0" fill="#c0392b"
        font-style="italic">p</text>
  <text x="160" y="51" font-family="sans-serif" font-size="2.6" fill="#c0392b">e</text>
  <text x="162.5" y="50" font-family="sans-serif" font-size="2.8" fill="#c0392b">
    feedback
  </text>

  <!-- ── PAI-SPECIFIC NOTE ── -->
  <text x="92.5" y="107" text-anchor="middle"
        font-family="sans-serif" font-size="3.2" fill="#7f8c8d">
    States: δ, ω, e'q, ψ2d, e'd, ψ2q   •   Algebraic: id, iq, pg, qg
  </text>
</svg>
